<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LDLP Solution Architecture — ms/sl/dp</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f5f4f0;
    color: #1a1a18;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 14px 24px;
    background: #fff;
    border-bottom: 1px solid #e0dfd8;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header h1 { font-size: 15px; font-weight: 600; color: #1a1a18; }
  header span { font-size: 12px; color: #888; font-weight: 400; }

  .workspace {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Diagram panel ── */
  .diagram-panel {
    flex: 1;
    overflow: auto;
    padding: 24px;
    display: flex;
    align-items: flex-start;
    justify-content: center;
  }

  svg {
    max-width: 680px;
    width: 100%;
    flex-shrink: 0;
  }

  /* ── Detail panel ── */
  .detail-panel {
    width: 320px;
    min-width: 320px;
    background: #fff;
    border-left: 1px solid #e0dfd8;
    display: flex;
    flex-direction: column;
    transition: transform 0.2s ease;
  }
  .detail-panel.hidden { display: none; }

  .detail-header {
    padding: 16px 18px 12px;
    border-bottom: 1px solid #eeedea;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
  }
  .detail-header h2 { font-size: 14px; font-weight: 600; line-height: 1.4; flex: 1; }
  .detail-tag {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 10px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    white-space: nowrap;
    margin-top: 2px;
  }

  .tag-raw      { background: #FAEEDA; color: #633806; }
  .tag-landing  { background: #E1F5EE; color: #085041; }
  .tag-cleaned  { background: #EEEDFE; color: #26215C; }
  .tag-curated  { background: #E6F1FB; color: #042C53; }
  .tag-source   { background: #F1EFE8; color: #2C2C2A; }
  .tag-serving  { background: #E1F5EE; color: #085041; }
  .tag-alert    { background: #FAECE7; color: #4A1B0C; }
  .tag-mdm      { background: #FAEEDA; color: #633806; }

  .close-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: #888;
    font-size: 18px;
    line-height: 1;
    padding: 2px 4px;
    border-radius: 4px;
  }
  .close-btn:hover { background: #f1efe8; color: #333; }

  .detail-body {
    padding: 16px 18px;
    overflow-y: auto;
    flex: 1;
    font-size: 13px;
    line-height: 1.6;
    color: #3a3a38;
  }

  .detail-body h3 {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #888;
    margin: 14px 0 6px;
  }
  .detail-body h3:first-child { margin-top: 0; }

  .detail-body p { margin-bottom: 8px; color: #444; }

  .detail-body ul {
    padding-left: 16px;
    margin-bottom: 8px;
    color: #444;
  }
  .detail-body ul li { margin-bottom: 3px; }

  .code-block {
    background: #f5f4f0;
    border: 1px solid #e0dfd8;
    border-radius: 6px;
    padding: 10px 12px;
    font-family: "SF Mono", "Fira Code", Consolas, monospace;
    font-size: 11px;
    line-height: 1.6;
    color: #2a2a28;
    overflow-x: auto;
    margin-bottom: 8px;
    white-space: pre;
  }

  .pill-row { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px; }
  .pill {
    font-size: 11px;
    background: #f1efe8;
    border: 1px solid #dddbd3;
    border-radius: 10px;
    padding: 2px 8px;
    color: #555;
  }

  .hint {
    background: #E6F1FB;
    border-left: 3px solid #185FA5;
    border-radius: 0 4px 4px 0;
    padding: 8px 10px;
    font-size: 12px;
    color: #0C447C;
    margin-bottom: 8px;
  }

  .warn {
    background: #FAEEDA;
    border-left: 3px solid #BA7517;
    border-radius: 0 4px 4px 0;
    padding: 8px 10px;
    font-size: 12px;
    color: #633806;
    margin-bottom: 8px;
  }

  /* ── Empty state ── */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: #aaa;
    gap: 8px;
    padding: 24px;
    text-align: center;
  }
  .empty-state svg { opacity: 0.3; }
  .empty-state p { font-size: 13px; }

  /* ── SVG node hover ── */
  .node { cursor: pointer; }
  .node:hover rect, .node:hover circle { opacity: 0.85; }
  .node.active rect { stroke-width: 2 !important; filter: drop-shadow(0 0 4px rgba(0,0,0,0.15)); }

  /* ── Color ramps (SVG classes) ── */
  .c-blue   rect, .c-blue   circle { fill: #E6F1FB; stroke: #185FA5; }
  .c-blue   .th, .c-blue   .t { fill: #0C447C; }
  .c-blue   .ts { fill: #185FA5; }

  .c-purple rect, .c-purple circle { fill: #EEEDFE; stroke: #534AB7; }
  .c-purple .th, .c-purple .t { fill: #26215C; }
  .c-purple .ts { fill: #3C3489; }

  .c-green  rect, .c-green  circle { fill: #EAF3DE; stroke: #3B6D11; }
  .c-green  .th, .c-green  .t { fill: #173404; }
  .c-green  .ts { fill: #27500A; }

  .c-amber  rect, .c-amber  circle { fill: #FAEEDA; stroke: #BA7517; }
  .c-amber  .th, .c-amber  .t { fill: #412402; }
  .c-amber  .ts { fill: #633806; }

  .c-teal   rect, .c-teal   circle { fill: #E1F5EE; stroke: #0F6E56; }
  .c-teal   .th, .c-teal   .t { fill: #04342C; }
  .c-teal   .ts { fill: #085041; }

  .c-coral  rect, .c-coral  circle { fill: #FAECE7; stroke: #993C1D; }
  .c-coral  .th, .c-coral  .t { fill: #4A1B0C; }
  .c-coral  .ts { fill: #712B13; }

  .c-gray   rect, .c-gray   circle { fill: #F1EFE8; stroke: #5F5E5A; }
  .c-gray   .th, .c-gray   .t { fill: #2C2C2A; }
  .c-gray   .ts { fill: #444441; }

  .box rect { fill: #F1EFE8; stroke: #5F5E5A; }

  .arr { fill: none; stroke: #888780; stroke-width: 1.5; marker-end: url(#arrow); }
  .leader { fill: none; stroke: #b4b2a9; stroke-width: 0.5; stroke-dasharray: 3 2; }

  .t  { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; font-weight: 400; fill: #1a1a18; }
  .th { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; font-weight: 600; fill: #1a1a18; }
  .ts { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 12px; font-weight: 400; fill: #5f5e5a; }

  @media (max-width: 700px) {
    .detail-panel { width: 100%; min-width: 0; border-left: none; border-top: 1px solid #e0dfd8; }
    .workspace { flex-direction: column; }
  }
</style>
</head>

├── is_competitor    boolean
├── _source          string   -- 'Tesco','OpenData',...
└── _load_ts         timestamp</div>
      <h3>Partitioning</h3>

function openDetail(id) {
  const d = details[id];
  if (!d) return;

  document.querySelectorAll('.node').forEach(n => n.classList.remove('active'));
  const node = document.querySelector(`[data-id="${id}"]`);
  if (node) node.classList.add('active');

  document.getElementById('detail-title').textContent = d.title;
  const tag = document.getElementById('detail-tag');
  tag.textContent = d.tag;
  tag.className = 'detail-tag ' + d.tagClass;
  document.getElementById('detail-body').innerHTML = d.body;

  document.getElementById('empty-panel').style.display = 'none';
  const panel = document.getElementById('detail-panel');
  panel.classList.remove('hidden');
}

function closePanel() {
  document.getElementById('detail-panel').classList.add('hidden');
  document.getElementById('empty-panel').style.display = 'flex';
  document.querySelectorAll('.node').forEach(n => n.classList.remove('active'));
}

document.querySelectorAll('.node[data-id]').forEach(node => {
  node.addEventListener('click', () => openDetail(node.dataset.id));
});
</script>
